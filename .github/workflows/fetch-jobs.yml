name: Fetch Denmark Data & BI Jobs

on:
  schedule:
    - cron: '17 * * * *'  # Every hour at :17 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch jobs from Jobindex
        run: python scripts/fetch_jobs.py

      - name: Commit and push updated jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/jobs.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update jobs data $(date -u +%Y-%m-%d) [skip ci]"
          git push
