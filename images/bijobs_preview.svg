  <rect x="580" y="448" width="176" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="668" y="463" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">⚡ Powered by Jobindex.dk · Daily</text>
